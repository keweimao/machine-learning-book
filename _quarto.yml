project:
  type: book
  output-dir: _book

book:
  title: "Machine Learning: The Quest for Information and Meaning"
  author: "Weimao Ke"
  description: "An introductory journey from data and information to machine learning, language, search, and evaluation."
  repo-url: https://github.com/keweimao/machine-learning-book
  repo-actions: [edit, issue]
  downloads: [pdf, epub]
  search: true
  chapters:
    - index.qmd
    - part: "Data, Information, and Mathematical Foundations"
      chapters:
        - chapters/01-data-to-meaning.qmd
        - chapters/02-data-representations.qmd
        - chapters/03-vectors-matrices-geometry.qmd
        - chapters/04-probability-statistics.qmd
        - chapters/05-information-entropy.qmd
        - chapters/06-data-preparation.qmd
    - part: "Learning from Data"
      chapters:
        - chapters/07-classification.qmd
        - chapters/08-multiclass.qmd
        - chapters/09-numeric-prediction.qmd
        - chapters/10-clustering.qmd
    - part: "Language, Retrieval, and Structure"
      chapters:
        - chapters/11-text-language.qmd
        - chapters/12-search-retrieval.qmd
        - chapters/13-structural-analysis.qmd
    - part: "Trustworthy and Practical Machine Learning"
      chapters:
        - chapters/14-evaluation.qmd
        - chapters/15-generalization.qmd
        - chapters/16-scaling.qmd
    - part: "Practice and Projects: A Companion Volume"
      chapters:
        - practice/index.qmd
        - practice/00-toolkit.qmd
        - practice/labs/setup.qmd
        - practice/labs/python-intro.qmd
        - practice/labs/python-io.qmd
        - practice/labs/python-selection.qmd
        - practice/labs/python-random.qmd
        - practice/labs/python-loops.qmd
        - practice/labs/python-file-processing.qmd
        - practice/01-from-data-to-information-and-meaning.qmd
        - practice/02-data-types-and-representations.qmd
        - practice/labs/python-data-types.qmd
        - practice/labs/python-data-structures.qmd
        - practice/labs/python-data-structures-assignment.qmd
        - practice/03-vectors-matrices-and-geometric-thinking.qmd
        - practice/labs/data-initialization-assignment.qmd
        - practice/04-probability-and-statistical-thinking.qmd
        - practice/labs/probability-linearity.qmd
        - practice/05-information-entropy-and-divergence.qmd
        - practice/06-data-preparation-and-feature-engineering.qmd
        - practice/labs/data-preprocessing.qmd
        - practice/labs/outliers.qmd
        - practice/07-classification.qmd
        - practice/08-multiclass-and-structured-decisions.qmd
        - practice/09-numeric-prediction-and-regression.qmd
        - practice/labs/classification-patterns-assignment.qmd
        - practice/10-clustering-and-organization.qmd
        - practice/labs/clustering.qmd
        - practice/11-text-and-human-language.qmd
        - practice/labs/text-vectorization.qmd
        - practice/labs/text-vectorization-assignment.qmd
        - practice/labs/integrated-learning-assignment.qmd
        - practice/12-search-and-retrieval.qmd
        - practice/labs/sqlite-assignment.qmd
        - practice/labs/sqlite.qmd
        - practice/labs/sqlite-python.qmd
        - practice/13-graphs-and-structural-analysis.qmd
        - practice/14-evaluation-and-experimentation.qmd
        - practice/labs/association-rules.qmd
        - practice/15-generalization-model-selection-and-fit.qmd
        - practice/16-scaling-deployment-and-responsible-use.qmd
        - practice/labs/data-mining-project.qmd
        - practice/labs/reinforcement-learning-extension.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    default-image-extension: svg
    code-fold: show
    code-copy: true
    toc-depth: 3
  pdf:
    documentclass: scrbook
    papersize: letter
    keep-tex: true
    toc: true
    lof: true
    lot: true
    default-image-extension: pdf
  epub:
    default-image-extension: svg

execute:
  freeze: auto
  warning: false
